name: menteviva
description: MenteViva - Potencialize a jornada terapêutica
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ══════════════════════════════════════
  # SUPABASE (backend único)
  # ══════════════════════════════════════
  supabase_flutter: ^2.3.0

  # ══════════════════════════════════════
  # GERENCIAMENTO DE ESTADO
  # ══════════════════════════════════════
  flutter_riverpod: ^3.3.1

  # ══════════════════════════════════════
  # NAVEGAÇÃO
  # ══════════════════════════════════════
  go_router: ^17.1.0

  # ══════════════════════════════════════
  # UI & DESIGN
  # ══════════════════════════════════════
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  animate_do: ^4.2.0
  lottie: ^3.0.0

  # ══════════════════════════════════════
  # GRÁFICOS
  # ══════════════════════════════════════
  fl_chart: ^1.2.0

  # ══════════════════════════════════════
  # FORMULÁRIOS
  # ══════════════════════════════════════
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # ══════════════════════════════════════
  # ARMAZENAMENTO LOCAL
  # ══════════════════════════════════════
  shared_preferences: ^2.2.2

  # ══════════════════════════════════════
  # UTILIDADES
  # ══════════════════════════════════════
  intl: ^0.20.2
  uuid: ^4.3.0
  url_launcher: ^6.2.0
  image_picker: ^1.0.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#4CAF50"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/